version: '3.8'
services:
  ap-core:
    build: .
    ports:
      - "443:443"
      - "80:80"
    environment:
      - AP_CORE_ADAPTER=sqlite
      - AP_CORE_DB_PATH=/data/ap-core.db
      - AP_CORE_WORKERS=${AP_CORE_WORKERS:-4}
      - AP_CORE_DRY_RUN=${AP_CORE_DRY_RUN:-false}
      - AP_CORE_TRUSTSTORE_PATH=/app/certs/truststore.pem
      - N42_HOME=/app/.node42
    volumes:
      - ap-core-data:/data
      - ./certs:/app/certs:ro
      - ./.node42:/app/.node42
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles:
      - with-payload-store

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - with-monitoring

volumes:
  ap-core-data:
  minio-data:
  prometheus-data:
